version: "2"

run:
  build-tags:
    - noaudio

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    paths:
      - testdata
