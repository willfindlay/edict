# Edict configuration (Windows)

[whisper]
# Path to whisper-server binary (whisper.cpp HTTP server)
server_path = "whisper-server"
# Host and port for the whisper HTTP server
host = "127.0.0.1"
port = 9988
# Path to the GGUF model file
model_path = ""
# Number of GPU layers to offload (-1 = all)
gpu_layers = -1
# Number of processing threads
threads = 4

[hotkey]
# Hotkey to activate recording (modifier+key)
# Supported modifiers: alt, ctrl, shift, super
# Supported keys: a-z, 0-9, f1-f12
modifier = "alt"
key = "m"

[input]
# Input mode: "hold" (hold-to-talk), "toggle" (press to start/stop), "auto" (VAD-based)
mode = "hold"
# VAD settings (only used in "auto" mode)
# RMS threshold below which audio is considered silence (0.0-1.0)
vad_threshold = 0.02
# Duration of silence (ms) before auto-stopping
vad_silence_ms = 800

[audio]
# Sample rate in Hz (whisper expects 16000)
sample_rate = 16000
# Number of audio channels (whisper expects 1)
channels = 1

[output]
# Typing backend: "sendinput" (Windows SendInput API)
backend = "sendinput"
# Delay between keystrokes in microseconds (0 = no delay)
keystroke_delay_us = 0

[overlay]
# Enable the waveform overlay window
enabled = true
# Overlay dimensions
width = 400
height = 60
# Target FPS for the overlay
fps = 60

[preview]
# Enable live transcription preview during recording
enabled = true
# Interval between preview transcriptions (ms, minimum 1000)
interval_ms = 3000
# Font size for preview text
font_size = 20
# Font path (Segoe UI on Windows)
font_path = 'C:\Windows\Fonts\segoeui.ttf'
# Maximum lines before oldest are dropped
max_lines = 6
# Padding inside the text box (px)
padding = 12

[context]
# WSL distro for auto-detecting Claude Code processes and accessing context files.
# Edict shells into WSL to scan /proc for CLAUDECODE=1, then reads CLAUDE.md,
# memory, and skills via \\wsl.localhost\<distro>\... UNC paths.
wsl_distro = "Arch"
# WSL user home (for global skills, memory). Auto-detected via wsl.exe if empty.
# wsl_home = ""
